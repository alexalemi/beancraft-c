# Unit tests (ASan/UBSan) + the full example suite (interpreted, -O, --check
# differential sweep, QBE-compiled), plus a short differential fuzz smoke.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lower ASLR entropy for the sanitizers
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Build qbe (not packaged for noble; the suite skips its tests if this fails)
        run: |
          curl -fsSL https://c9x.me/compile/release/qbe-1.2.tar.xz | tar xJ \
            && make -C qbe-1.2 -j2 \
            && sudo make -C qbe-1.2 install \
            || echo "qbe unavailable; compiled-path tests will be skipped"
      - name: make test
        run: make test

  fuzz-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Lower ASLR entropy for the sanitizers
        run: sudo sysctl vm.mmap_rnd_bits=28
      - name: Build the differential fuzzer
        run: make fuzz
      - name: Fuzz for 60 seconds
        run: build/fuzz_pipeline build/fuzz-corpus -max_len=4096 -rss_limit_mb=4096 -max_total_time=60 -print_final_stats=1
